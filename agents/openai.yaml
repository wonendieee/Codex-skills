interface:
  display_name: "Windows PowerShell Safety"
  short_description: "Safer UTF-8 and sandbox-aware PowerShell commands"
  default_prompt: "Use $windows-powershell-safety before running Windows PowerShell commands that may touch UTF-8 text, Node wrappers, paths, parallel shell reads, or sandbox approvals."

policy:
  allow_implicit_invocation: true
